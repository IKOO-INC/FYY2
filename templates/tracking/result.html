<!DOCTYPE html>
<html>

<head>

<title>Tracking Paket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="card">

<h2>Tracking Paket</h2>

<p>

Nomor Resi

</p>

<h3>

<span class="badge">

{{ order.tracking_code }}

</span>

</h3>

<div class="timeline">

{% for item in order.statuses|reverse %}

<div class="timeline-item">

<div class="timeline-status">

{{ item.status }}

</div>

<div class="timeline-time">

{{ item.time.strftime('%d %B %Y %H:%M WIB') }}

</div>

</div>

{% endfor %}

</div>

<br>

<a href="/tracking">

← Cari Resi Lagi

</a>

</div>

</div>

</body>

</html>
